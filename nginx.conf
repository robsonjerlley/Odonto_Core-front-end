server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Proxy reverso para o backend — evita CORS e mantém o front usando
    # baseURL relativa (VITE_API_URL vazia). BACKEND_URL deve ser setada
    # como env var runtime no Railway, ex: odontocore-backend.up.railway.app
    location /api/ {
        proxy_pass https://${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host ${BACKEND_URL};
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # SPA: redireciona tudo para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash no nome
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
